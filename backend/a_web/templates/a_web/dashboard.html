{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | WAMANAGE</title>
    <link rel="stylesheet" href="{% static 'a_web/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="logo">WA<span>MANAGE</span></div>

            <div class="nav-section-title">Main</div>
            <nav>
                <div class="nav-item {% if active_tab == 'sessions' or not active_tab %}active{% endif %}"
                    hx-get="{% url 'web-sessions' %}" hx-target="#main-content-area" hx-push-url="true"
                    onclick="setActive(this)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    Sessions
                </div>
            </nav>

            <div class="nav-section-title">Developers</div>
            <nav id="dev-nav">
                <div class="nav-item {% if active_tab == 'docs' %}active{% endif %}"
                    hx-get="{% url 'web-docs-section' 'auth' %}" hx-target="#main-content-area" hx-push-url="true"
                    onclick="setDocActive(this)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    Documentation
                </div>
                <div class="sub-nav" id="docs-sub-nav" {% if active_tab != 'docs' %}style="display: none;" {% endif %}>
                    <div class="sub-nav-item {% if active_section == 'auth' %}active{% endif %}"
                        hx-get="{% url 'web-docs-section' 'auth' %}" hx-target="#main-content-area" hx-push-url="true"
                        onclick="setSubActive(this)">Authentication</div>
                    <div class="sub-nav-item {% if active_section == 'send-message' %}active{% endif %}"
                        hx-get="{% url 'web-docs-section' 'send-message' %}" hx-target="#main-content-area"
                        hx-push-url="true" onclick="setSubActive(this)">Send Message</div>
                    <div class="sub-nav-item {% if active_section == 'send-image' %}active{% endif %}"
                        hx-get="{% url 'web-docs-section' 'send-image' %}" hx-target="#main-content-area"
                        hx-push-url="true" onclick="setSubActive(this)">Send Image</div>
                    <div class="sub-nav-item {% if active_section == 'webhooks' %}active{% endif %}"
                        hx-get="{% url 'web-docs-section' 'webhooks' %}" hx-target="#main-content-area"
                        hx-push-url="true" onclick="setSubActive(this)">Webhooks</div>
                </div>
            </nav>

            <div style="margin-top: auto;">
                <nav>
                    <a href="{% url 'web-logout' %}" class="nav-item" style="text-decoration: none; color: inherit;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Logout
                    </a>
                </nav>
            </div>
        </aside>

        <main class="main-content" id="main-content-area">
            {% if active_tab == 'docs' %}
            {% include doc_template %}
            {% else %}
            {% include 'a_web/partials/sessions_list.html' %}
            {% endif %}
        </main>
    </div>

    <script>
        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('docs-sub-nav').style.display = 'none';
        }

        function setDocActive(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('docs-sub-nav').style.display = 'block';
            // Also reset sub-nav actives
            document.querySelectorAll('.sub-nav-item').forEach(item => item.classList.remove('active'));
            document.querySelector('.sub-nav-item').classList.add('active');
        }

        function setSubActive(el) {
            document.querySelectorAll('.sub-nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>

</html>
