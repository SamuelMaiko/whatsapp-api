{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Manage | Professional Automation</title>
    <link rel="stylesheet" href="{% static 'a_web/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <div class="auth-container">
            <div class="auth-card">
                <div class="logo">WA<span>MANAGE</span></div>
                <h2 style="text-align: center; margin-bottom: 1.5rem;">
                    {% if is_signup %}Create Account{% else %}Sign In{% endif %}
                </h2>
                {% if error %}<p style="color:red;text-align:center;margin-bottom:1rem;">{{ error }}</p>{% endif %}
                <form method="POST"
                    action="{% if is_signup %}{% url 'web-signup' %}{% else %}{% url 'web-login' %}{% endif %}">
                    {% csrf_token %}
                    <div class="form-group" {% if not is_signup %}style="display:none;" {% endif %}>
                        <label>Full Name</label>
                        <input type="text" name="name" placeholder="John Doe" {% if is_signup %}required{% endif %}>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" required placeholder="name@company.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn">
                        {% if is_signup %}Sign Up{% else %}Sign In{% endif %}
                    </button>
                    <div style="text-align:center;margin-top:1rem;color:#64748b;font-size:0.875rem;">
                        {% if is_signup %}
                        Already have an account? <a href="{% url 'web-login' %}"
                            style="color:var(--primary-color);font-weight:600;">Sign In</a>
                        {% else %}
                        Don't have an account? <a href="{% url 'web-signup' %}"
                            style="color:var(--primary-color);font-weight:600;">Create one</a>
                        {% endif %}
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
