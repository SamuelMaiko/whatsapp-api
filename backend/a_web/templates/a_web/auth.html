{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Manage | Professional Automation</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <div id="auth-view" class="auth-container">
            <div class="auth-card">
                <div class="logo">WA<span>MANAGE</span></div>
                <h2 style="text-align: center; margin-bottom: 1.5rem;" id="auth-title">Welcome Back</h2>
                {% if error %}
                <p style="color: red; text-align: center; margin-bottom: 1rem;">{{ error }}</p>
                {% endif %}
                <form id="auth-form" method="POST" action="{% url 'web-login' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" required placeholder="name@company.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn" id="auth-btn">Sign In</button>
                    <p style="text-align: center; margin-top: 1rem; color: #64748b; font-size: 0.875rem;">
                        To create an account, please use the API endpoint.
                    </p>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
