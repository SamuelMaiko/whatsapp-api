<div class="session-card" id="session-{{ session.id }}">
    <div class="session-header">
        <div class="status-indicator status-{{ session.status|lower }}"></div>
        <div class="session-id">{{ session.id }}</div>
        <button class="delete-btn" hx-delete="{% url 'web-session-delete' session.id %}"
            hx-target="#session-{{ session.id }}" hx-confirm="Are you sure you want to delete this session?"
            hx-swap="outerHTML">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
            </svg>
        </button>
    </div>

    <div class="session-body">
        <div class="status-text">Status: <span>{{ session.status }}</span></div>

        {% if session.status == 'QR' or session.status == 'INIT' %}
        <div class="qr-container">
            {% if session.qr %}
            <img src="{{ session.qr }}" alt="QR Code" style="width: 100%;">
            {% else %}
            <div class="loader">Generating QR...</div>
            {% endif %}
        </div>
        {% endif %}

        <div class="api-key-section">
            <label>API Key</label>
            <div class="key-display">
                <input type="password" value="{{ session.apiKey }}" readonly>
                <button onclick="copyKey(this, '{{ session.apiKey }}')">Copy</button>
            </div>
        </div>

        <form hx-post="{% url 'web-webhook-update' session.id %}" hx-target="#session-{{ session.id }}"
            hx-swap="outerHTML" class="webhook-section">
            <label>Webhook URL</label>
            <div class="webhook-input-group">
                <input type="url" name="webhookUrl" value="{{ session.webhookUrl|default:'' }}"
                    placeholder="https://your-api.com/webhook">
                <button type="submit" class="save-btn">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
    if (typeof copyKey === 'undefined') {
        window.copyKey = function (btn, val) {
            navigator.clipboard.writeText(val);
            const original = btn.innerText;
            btn.innerText = 'Copied!';
            setTimeout(() => btn.innerText = original, 2000);
        }
    }
</script>
