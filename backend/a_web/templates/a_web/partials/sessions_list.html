<header class="page-header">
    <div>
        <h1>Sessions</h1>
        <p style="color: var(--text-muted)">Manage your connected WhatsApp instances</p>
    </div>
    <button class="btn" style="width: auto; padding: 0.75rem 1.5rem;" hx-post="{% url 'web-session-create' %}"
        hx-target="#sessions-grid" hx-swap="afterbegin">
        + Add Session
    </button>
</header>

<div class="sessions-grid" id="sessions-grid">
    {% for session in sessions %}
    {% include 'a_web/partials/session_card.html' with session=session %}
    {% empty %}
    <div class="empty-state" style="grid-column: 1/-1; text-align: center; padding: 4rem;">
        <h3>No sessions yet</h3>
        <p>Connect your first WhatsApp account to get started.</p>
    </div>
    {% endfor %}
</div>
